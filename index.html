<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker · v2.6.1 (layout update)</title>
<style>
  /* ----- THEME VARIABLES (applied to body) ----- */
  body.theme-dark {
    --bg: #111;
    --surface: #1c1c1c;
    --surface-light: #2a2a2a;
    --text: white;
    --text-secondary: #aaa;
    --accent: #4caf50;
    --accent-light: #6fbf73;
    --danger: #cf6679;
    --warning: #f9a825;
    --border: #333;
  }
  body.theme-light {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-light: #e0e0e0;
    --text: #222;
    --text-secondary: #555;
    --accent: #2e7d32;
    --accent-light: #4caf50;
    --danger: #b00020;
    --warning: #f57c00;
    --border: #ccc;
  }
  body.theme-cute {
    --bg: #fff5f7;
    --surface: #ffe9ec;
    --surface-light: #ffd9e0;
    --text: #4a4a4a;
    --text-secondary: #7a7a7a;
    --accent: #ff8a9f;
    --accent-light: #ffb6c1;
    --danger: #ff6b6b;
    --warning: #ffb347;
    --border: #fcc;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    transition: background 0.2s, color 0.2s;
  }
  .container {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }
  button {
    padding: 10px;
    margin: 5px 0;
    background: var(--surface-light);
    color: var(--text);
    border: none;
    border-radius: 8px;
    width: 100%;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: var(--border); }
  button.small-btn {
    width: auto;
    padding: 5px 10px;
    font-size: 12px;
    margin: 2px;
  }
  .btn-primary { background: var(--accent); color: var(--text); }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-danger { background: var(--danger); color: var(--text); }
  .btn-warning { background: var(--warning); color: var(--text); }

  input, select, textarea {
    padding: 8px;
    margin: 4px 0;
    border-radius: 6px;
    border: 1px solid var(--border);
    width: 100%;
    background: var(--surface);
    color: var(--text);
  }
  .exercise-card {
    background: var(--surface);
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    cursor: grab;
    transition: background 0.2s;
  }
  .exercise-card.dragging {
    opacity: 0.5;
    background: var(--surface-light);
    cursor: grabbing;
  }
  .exercise-card .drag-handle {
    font-size: 20px;
    margin-right: 8px;
    color: var(--text-secondary);
    user-select: none;
  }
  .timer {
    font-size: 32px;
    text-align: center;
    margin: 15px 0;
    background: var(--surface);
    padding: 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .flex-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .history-item, .template-item, .weight-item {
    background: var(--surface);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
  }
  .history-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .version-badge {
    background: var(--surface-light);
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }
  .import-export-bar {
    display: flex;
    gap: 6px;
    margin: 10px 0;
    flex-wrap: wrap;
  }
  .countdown {
    background: #9c27b0;
    color: white;
    padding: 12px;
    border-radius: 40px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(156,39,176,0.3);
  }
  .theme-picker {
    display: flex;
    gap: 8px;
    margin: 20px 0;
    justify-content: center;
  }
  .theme-picker button {
    width: auto;
    padding: 8px 16px;
    background: var(--surface-light);
    border: 1px solid var(--border);
  }
  .person-card {
    background: var(--surface-light);
    padding: 12px;
    border-radius: 12px;
    flex: 1;
    min-width: 160px;
  }
  .person-card .delta {
    font-weight: bold;
  }
  .delta.positive { color: var(--danger); }  /* gain = red */
  .delta.negative { color: var(--accent); }   /* loss = green */
  .weight-summary-cards {
    background: var(--surface);
    padding: 16px;
    border-radius: 12px;
    margin: 16px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .weight-logging {
    background: var(--surface);
    padding: 16px;
    border-radius: 12px;
    margin: 16px 0;
  }
  .sticky-share-bar {
    position: sticky;
    bottom: 10px;
    background: var(--surface-light);
    padding: 10px;
    border-radius: 30px;
    margin-top: 10px;
    display: flex;
    gap: 8px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
(function() {
  const APP_VERSION = '2.6.1'; // layout update

  // ----- DEFAULT TEMPLATES (unchanged) -----
  const DEFAULT_TEMPLATES = [ /* ... keep full list ... */ ];

  // ----- Load / merge data (unchanged) -----
  let stored = JSON.parse(localStorage.getItem("workoutApp")) || null;
  let data;

  if (!stored) {
    data = {
      templates: [...DEFAULT_TEMPLATES],
      activeWorkout: null,
      history: [],
      bodyWeight: [],
      theme: 'dark',
      version: APP_VERSION
    };
  } else {
    let mergedTemplates = stored.templates || [];
    DEFAULT_TEMPLATES.forEach(def => {
      const exists = mergedTemplates.some(t => t.id === def.id);
      if (!exists) mergedTemplates.push(def);
    });
    data = {
      templates: mergedTemplates,
      activeWorkout: stored.activeWorkout || null,
      history: stored.history || [],
      bodyWeight: stored.bodyWeight || [],
      theme: stored.theme || 'dark',
      version: APP_VERSION
    };
  }

  // Ensure every template has an id
  data.templates = data.templates.map(t => ({
    id: t.id || 'user-' + Date.now() + '-' + Math.random().toString(36).substring(2,8),
    ...t
  }));

  // Migrate old weight entries: assign person if missing (default Dexter)
  data.bodyWeight = data.bodyWeight.map(w => ({
    ...w,
    person: w.person || 'Dexter'
  }));

  // ----- Migrate old active workout (unchanged) -----
  if (data.activeWorkout && typeof data.activeWorkout.currentExercise === 'number' && data.activeWorkout.currentView === undefined) {
    data.activeWorkout.currentView = 'dashboard';
    delete data.activeWorkout.currentExercise;
    if (!data.activeWorkout.logs) {
      data.activeWorkout.logs = data.activeWorkout.exercises.map(e => ({
        name: e.name,
        sets: Array.from({ length: e.sets }, () => ({ weight: "", reps: "" }))
      }));
    }
  }

  // ----- Helper functions -----
  function save() {
    localStorage.setItem("workoutApp", JSON.stringify(data));
  }

  function applyTheme() {
    document.body.className = `theme-${data.theme}`;
  }

  // ----- Timer (unchanged) -----
  let timerInterval = null;
  function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function startTimer(seconds) { /* ... unchanged ... */ }
  function updateTimerDisplay() { /* ... unchanged ... */ }
  function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
  function resumeTimerIfNeeded() { /* ... unchanged ... */ }
  document.addEventListener('visibilitychange', () => { if (!document.hidden) { resumeTimerIfNeeded(); if (data.activeWorkout) renderWorkout(); } });

  // ----- SHARE / IMPORT (unchanged) -----
  function parseShareLink() { /* ... unchanged ... */ }
  parseShareLink();

  // ----- WEIGHT TRACKING (unchanged) -----
  window.addWeight = () => {
    const weightInput = document.getElementById('newWeight');
    const personSelect = document.getElementById('weightPerson');
    const dateInput = document.getElementById('weightDate');
    const weight = parseFloat(weightInput.value);
    if (isNaN(weight) || weight <= 0) { alert('Please enter a valid weight (kg)'); return; }
    const person = personSelect.value;
    let date = dateInput.value ? new Date(dateInput.value + 'T12:00:00') : new Date();
    data.bodyWeight.push({ date: date.toISOString(), weight, person });
    data.bodyWeight.sort((a,b) => new Date(a.date) - new Date(b.date));
    save();
    weightInput.value = '';
    dateInput.value = '';
    renderHome();
  };
  window.deleteWeight = (index) => { if (confirm('Delete this weight entry?')) { data.bodyWeight.splice(index, 1); save(); renderHome(); } };

  // ----- PROGRESS SUMMARY (unchanged) -----
  window.copyProgressSummary = () => { /* ... unchanged ... */ };

  // ----- THEME PICKER -----
  window.setTheme = (theme) => { data.theme = theme; save(); applyTheme(); if (data.activeWorkout) renderWorkout(); else renderHome(); };

  // ----- TEMPLATE CRUD (unchanged) -----
  window.createTemplate = () => { /* ... unchanged ... */ };
  window.deleteTemplate = (id) => { /* ... unchanged ... */ };
  function findTemplateIndex(id) { return data.templates.findIndex(t => t.id === id); }
  window.editTemplate = (id) => { /* ... unchanged ... */ };
  window.editExercise = (templateId, exerciseIdx) => { /* ... unchanged ... */ };
  window.updateRest = (id,val) => { /* ... unchanged ... */ };
  window.addExercise = (id) => { /* ... unchanged ... */ };
  window.deleteExercise = (id, ei) => { /* ... unchanged ... */ };

  // ----- WORKOUT FLOW (unchanged) -----
  window.startWorkout = (id) => { /* ... unchanged ... */ };
  function renderWorkout() { /* ... unchanged ... */ }
  function renderWorkoutDashboard() { /* ... unchanged ... */ }
  function renderExerciseDetail(exIndex) { /* ... unchanged ... */ }
  window.doExercise = (exIndex) => { /* ... unchanged ... */ };
  window.goToDashboard = () => { /* ... unchanged ... */ };
  window.updateSet = (exIndex, setIndex, field, value) => { /* ... unchanged ... */ };
  window.completeSet = (exIndex, setIndex) => { /* ... unchanged ... */ };
  window.endWorkout = () => { /* ... unchanged ... */ };

  // ----- HISTORY (unchanged) -----
  window.exportHistory = () => { /* ... unchanged ... */ };
  window.importHistoryPrompt = () => { /* ... unchanged ... */ };
  window.deleteHistoryEntry = (index) => { /* ... unchanged ... */ };
  window.clearAllHistory = () => { /* ... unchanged ... */ };

  // ----- SHARE SELECTION (unchanged) -----
  let selectedShareIds = [];
  window.selectForShare = (id) => { /* ... unchanged ... */ };
  window.copyShareLink = () => { /* ... unchanged ... */ };
  window.exportPrompt = () => { /* ... unchanged ... */ };

  // ----- RENDER HOME with new layout -----
  function renderHome() {
    const app = document.getElementById("app");
    applyTheme();

    // Countdown
    const now = new Date();
    let target = new Date(now.getFullYear(), 4, 1);
    if (now > target) target = new Date(now.getFullYear() + 1, 4, 1);
    const diffMs = target - now;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const countdownText = `❤️ ${diffDays} days, ${diffHours} hours until May 1 ❤️`;

    // Person stats for cards
    const persons = ['Dexter', 'Cheryl'];
    const personStats = persons.map(person => {
      const weights = data.bodyWeight.filter(w => w.person === person);
      if (weights.length === 0) return { person, first: null, last: null, delta: null };
      const first = weights[0];
      const last = weights[weights.length-1];
      const delta = (last.weight - first.weight).toFixed(1);
      return { person, first, last, delta };
    });

    app.innerHTML = `
      <div class="countdown">${countdownText}</div>

      <!-- Weight Cards (top) -->
      <div class="weight-summary-cards">
        ${personStats.map(stat => {
          if (!stat.first) {
            return `<div class="person-card"><b>${stat.person}</b><br>No entries yet</div>`;
          }
          const deltaClass = stat.delta > 0 ? 'positive' : (stat.delta < 0 ? 'negative' : '');
          const arrow = stat.delta > 0 ? '▲' : (stat.delta < 0 ? '▼' : '●');
          return `
            <div class="person-card">
              <b>${stat.person}</b><br>
              Start: ${stat.first.weight} kg (${new Date(stat.first.date).toLocaleDateString()})<br>
              Now: ${stat.last.weight} kg (${new Date(stat.last.date).toLocaleDateString()})<br>
              <span class="delta ${deltaClass}">${arrow} ${Math.abs(stat.delta)} kg</span>
            </div>
          `;
        }).join('')}
      </div>

      <!-- Workouts Header  -->
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🏋️ Workouts</h2>
        <span class="version-badge">v${APP_VERSION}</span>
      </div>
      <button onclick="createTemplate()">➕ Create Workout</button>
      <button onclick="exportPrompt()" style="background:var(--surface-light);">🔗 Share / Import Workouts</button>
      <div id="templateList">
        ${data.templates.map((t,i)=>`
          <div class="template-item">
            <div style="display:flex; justify-content:space-between;">
              <b>${t.name}</b> <span style="color:var(--text-secondary);">${t.exercises.length} ex</span>
            </div>
            <div class="flex-row" style="margin-top:8px;">
              <button class="small-btn" onclick="startWorkout('${t.id}')">▶️ Start</button>
              <button class="small-btn" onclick="editTemplate('${t.id}')">✏️ Edit</button>
              <button class="small-btn" onclick="deleteTemplate('${t.id}')">🗑️</button>
              <button class="small-btn" onclick="selectForShare('${t.id}')" style="background:var(--surface-light);">🔗 Select</button>
            </div>
          </div>
        `).join("")}
      </div>


      <!-- Weight Logging Panel (inputs + past entries) -->
      <div class="weight-logging">
        <h3>⚖️ Log New Weight</h3>
        <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
          <input type="number" id="newWeight" placeholder="Weight (kg)" step="0.1" style="flex:2;">
          <select id="weightPerson" style="flex:1;">
            <option value="Dexter">Dexter</option>
            <option value="Cheryl">Cheryl</option>
          </select>
          <input type="date" id="weightDate" style="flex:2;" placeholder="Date (optional)">
          <button class="small-btn btn-primary" onclick="addWeight()" style="width:auto;">➕ Log</button>
          <button class="small-btn" onclick="copyProgressSummary()" style="background:var(--accent);">📤 Copy Summary</button>
        </div>
      
      <!-- Theme Picker -->
      <div class="theme-picker">
        <button class="small-btn" onclick="setTheme('dark')">🌙 Dark</button>
        <button class="small-btn" onclick="setTheme('light')">☀️ Light</button>
        <button class="small-btn" onclick="setTheme('cute')">🌸 Cute</button>
      </div>
      
        <div style="margin-top:24px;">
          <h4>Past entries</h4>
          ${data.bodyWeight.map((w, idx) => `
            <div class="weight-item flex-row" style="justify-content:space-between;">
              <span>${new Date(w.date).toLocaleDateString()} – <b>${w.person}</b>: <strong>${w.weight} kg</strong></span>
              <button class="small-btn btn-danger" onclick="deleteWeight(${idx})">🗑️</button>
            </div>
          `).join('')}
          ${data.bodyWeight.length === 0 ? '<p style="color:var(--text-secondary);">No weight logged yet.</p>' : ''}
        </div>
      </div>

      <h3 style="margin-top:24px;">📜 Full History (${data.history.length})</h3>
      <div class="import-export-bar">
        <button class="small-btn" onclick="exportHistory()" style="background:var(--surface-light);">📤 Export History</button>
        <button class="small-btn" onclick="importHistoryPrompt()" style="background:var(--surface-light);">📥 Import History</button>
        <button class="small-btn btn-danger" onclick="clearAllHistory()">🗑️ Clear All</button>
      </div>
      <div id="historyList">
        ${data.history.slice().reverse().map((s, idx) => {
          const realIndex = data.history.length - 1 - idx;
          return `
          <div class="history-item">
            <div style="display:flex; justify-content:space-between;">
              <b>${s.templateName}</b>
              <span style="color:var(--text-secondary);">${new Date(s.date).toLocaleString()}</span>
            </div>
            <details>
              <summary>View details</summary>
              ${s.logs.map(l => `
                <div style="margin:6px 0; background:var(--surface-light); padding:6px; border-radius:6px;">
                  <b>${l.name}</b><br>
                  ${l.sets.map((set, setIdx) => `
                    Set ${setIdx+1}: ${set.weight || '?'} kg × ${set.reps || '?'} reps
                  `).join('<br>')}
                </div>
              `).join('')}
            </details>
            <div class="history-actions">
              <button class="small-btn btn-danger" onclick="deleteHistoryEntry(${realIndex})">Delete</button>
            </div>
          </div>
        `}).join('')}
        ${data.history.length === 0 ? '<p style="color:var(--text-secondary);">No past workouts yet.</p>' : ''}
      </div>
    `;

    // Share bar if templates selected
    if (selectedShareIds.length > 0) {
      let bar = document.getElementById('shareBar');
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'shareBar';
        bar.className = 'sticky-share-bar';
        document.getElementById('app').appendChild(bar);
      }
      bar.innerHTML = `
        <span>${selectedShareIds.length} selected</span>
        <button class="small-btn" onclick="copyShareLink()">📋 Copy link</button>
        <button class="small-btn btn-danger" onclick="selectedShareIds=[]; renderHome();">✖ Clear</button>
      `;
    }
  }

  window.renderHome = renderHome;
  window.save = save;

  applyTheme();
  renderHome();
  resumeTimerIfNeeded();
})();
</script>
</body>
</html>
