<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker · v2.7.0 (Not Cheryl + past hints)</title>
<style>
  /* ----- THEME VARIABLES (applied to body) ----- */
  body.theme-dark {
    --bg: #111;
    --surface: #1c1c1c;
    --surface-light: #2a2a2a;
    --text: white;
    --text-secondary: #aaa;
    --accent: #4caf50;
    --accent-light: #6fbf73;
    --danger: #cf6679;
    --warning: #f9a825;
    --border: #333;
  }
  body.theme-light {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-light: #e0e0e0;
    --text: #222;
    --text-secondary: #555;
    --accent: #2e7d32;
    --accent-light: #4caf50;
    --danger: #b00020;
    --warning: #f57c00;
    --border: #ccc;
  }
  body.theme-cute, body.theme-notcheryl {
    --bg: #fff5f7;
    --surface: #ffe9ec;
    --surface-light: #ffd9e0;
    --text: #4a4a4a;
    --text-secondary: #7a7a7a;
    --accent: #ff8a9f;
    --accent-light: #ffb6c1;
    --danger: #ff6b6b;
    --warning: #ffb347;
    --border: #fcc;
  }
  /* Not Cheryl hides weight-related sections */
  body.theme-notcheryl .countdown,
  body.theme-notcheryl .weight-summary-cards,
  body.theme-notcheryl .weight-logging {
    display: none !important;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    transition: background 0.2s, color 0.2s;
  }
  .container {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }
  button {
    padding: 10px;
    margin: 5px 0;
    background: var(--surface-light);
    color: var(--text);
    border: none;
    border-radius: 8px;
    width: 100%;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: var(--border); }
  button.small-btn {
    width: auto;
    padding: 5px 10px;
    font-size: 12px;
    margin: 2px;
  }
  .btn-primary { background: var(--accent); color: var(--text); }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-danger { background: var(--danger); color: var(--text); }
  .btn-warning { background: var(--warning); color: var(--text); }

  input, select, textarea {
    padding: 8px;
    margin: 4px 0;
    border-radius: 6px;
    border: 1px solid var(--border);
    width: 100%;
    background: var(--surface);
    color: var(--text);
  }
  .exercise-card {
    background: var(--surface);
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    cursor: grab;
    transition: background 0.2s;
  }
  .exercise-card.dragging {
    opacity: 0.5;
    background: var(--surface-light);
    cursor: grabbing;
  }
  .exercise-card .drag-handle {
    font-size: 20px;
    margin-right: 8px;
    color: var(--text-secondary);
    user-select: none;
  }
  .timer {
    font-size: 32px;
    text-align: center;
    margin: 15px 0;
    background: var(--surface);
    padding: 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .flex-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .history-item, .template-item, .weight-item {
    background: var(--surface);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
  }
  .history-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .version-badge {
    background: var(--surface-light);
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }
  .import-export-bar {
    display: flex;
    gap: 6px;
    margin: 10px 0;
    flex-wrap: wrap;
  }
  .countdown {
    background: #9c27b0;
    color: white;
    padding: 12px;
    border-radius: 40px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(156,39,176,0.3);
  }
  .theme-picker {
    display: flex;
    gap: 8px;
    margin: 20px 0;
    justify-content: center;
  }
  .theme-picker button {
    width: auto;
    padding: 8px 16px;
    background: var(--surface-light);
    border: 1px solid var(--border);
  }
  .person-card {
    background: var(--surface-light);
    padding: 12px;
    border-radius: 12px;
    flex: 1;
    min-width: 160px;
  }
  .person-card .delta {
    font-weight: bold;
  }
  .delta.positive { color: var(--danger); }  /* gain = red */
  .delta.negative { color: var(--accent); }   /* loss = green */
  .weight-summary-cards {
    background: var(--surface);
    padding: 16px;
    border-radius: 12px;
    margin: 16px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .weight-logging {
    background: var(--surface);
    padding: 16px;
    border-radius: 12px;
    margin: 16px 0;
  }
  .sticky-share-bar {
    position: sticky;
    bottom: 10px;
    background: var(--surface-light);
    padding: 10px;
    border-radius: 30px;
    margin-top: 10px;
    display: flex;
    gap: 8px;
    border: 1px solid var(--border);
  }
  .past-hint {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
(function() {
  const APP_VERSION = '2.7.0'; // Not Cheryl theme + past hints

  // ----- DEFAULT TEMPLATES (full list) -----
  const DEFAULT_TEMPLATES = [
    {
      id: 'default_upper1',
      name: "Upper 1 – Pull Dominant",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Vertical Pull (Wide Grip)", sets: 2 },
        { name: "Horizontal Row", sets: 2 },
        { name: "Vertical Pull (Close / Neutral)", sets: 2 },
        { name: "Incline Press (60°)", sets: 2 },
        { name: "Lateral Raises", sets: 2 },
        { name: "Optional Arms", sets: 2 }
      ]
    },
    {
      id: 'default_lower1',
      name: "Lower 1 – Quad Emphasis",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Quad Dominant Squat", sets: 3 },
        { name: "Bulgarian Split Squats (Shorter Stride)", sets: 3 },
        { name: "Romanian Deadlift", sets: 3 },
        { name: "Hip Thrust", sets: 3 }
      ]
    },
    {
      id: 'default_upper2',
      name: "Upper 2 – Push Dominant",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Overhead Press", sets: 2 },
        { name: "Incline Press (60°)", sets: 2 },
        { name: "Lateral Raises", sets: 2 },
        { name: "Horizontal Row (Different Variation)", sets: 2 },
        { name: "Vertical Pull (Neutral or Supinated)", sets: 2 },
        { name: "Optional Arms", sets: 2 }
      ]
    },
    {
      id: 'default_lower2',
      name: "Lower 2 – Glute / Hinge Emphasis",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Romanian Deadlift (Primary Hinge)", sets: 3 },
        { name: "Hip Thrust (Heavier Than Lower 1)", sets: 3 },
        { name: "Glute Dominant Squat", sets: 3 },
        { name: "Bulgarian Split Squats (Longer Stride)", sets: 3 }
      ]
    },
    {
      id: 'default_full',
      name: "Full Body",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Pull up/down", sets: 2 },
        { name: "Incline push", sets: 2 },
        { name: "Horizontal pull", sets: 2 },
        { name: "Lateral raises", sets: 2 },      
        { name: "Romanian Deadlift", sets: 3 },
        { name: "Goblet squats", sets: 3 },
        { name: "Bulgarian Split Squats", sets: 3 }
      ]
    },
    {
      id: 'default_full1',
      name: "Full Body Pull Focused",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Pull up/down (Wide)", sets: 2 },
        { name: "Horizontal pull", sets: 2 },
        { name: "Pull up/down (Close)", sets: 2 },    
        { name: "Romanian Deadlift", sets: 3 },
        { name: "Goblet squats", sets: 3 },
        { name: "Bulgarian Split Squats", sets: 3 }
      ]
    },
    {
      id: 'default_full2',
      name: "Full Body Push Focused",
      rest: 120,
      repRange: "8-15",
      exercises: [
        { name: "Incline push", sets: 2 },
        { name: "Seated/Standing shoulder press", sets: 2 },
        { name: "Lateral raises", sets: 2 },      
        { name: "Romanian Deadlift", sets: 3 },
        { name: "Goblet squats", sets: 3 },
        { name: "Bulgarian Split Squats", sets: 3 }
      ]
    }
  ];

  // ----- Load / merge data -----
  let stored = JSON.parse(localStorage.getItem("workoutApp")) || null;
  let data;

  if (!stored) {
    data = {
      templates: [...DEFAULT_TEMPLATES],
      activeWorkout: null,
      history: [],
      bodyWeight: [],
      theme: 'dark',
      version: APP_VERSION
    };
  } else {
    // merge missing default templates
    let mergedTemplates = stored.templates || [];
    DEFAULT_TEMPLATES.forEach(def => {
      const exists = mergedTemplates.some(t => t.id === def.id);
      if (!exists) mergedTemplates.push(def);
    });
    data = {
      templates: mergedTemplates,
      activeWorkout: stored.activeWorkout || null,
      history: stored.history || [],
      bodyWeight: stored.bodyWeight || [],
      theme: stored.theme || 'dark',
      version: APP_VERSION
    };
  }

  // Ensure every template has an id
  data.templates = data.templates.map(t => ({
    id: t.id || 'user-' + Date.now() + '-' + Math.random().toString(36).substring(2,8),
    ...t
  }));

  // Migrate old weight entries: assign person if missing (default Dexter)
  data.bodyWeight = data.bodyWeight.map(w => ({
    ...w,
    person: w.person || 'Dexter'
  }));

  // ----- Migrate old active workout (v2.3) to new format (free order) -----
  if (data.activeWorkout && typeof data.activeWorkout.currentExercise === 'number' && data.activeWorkout.currentView === undefined) {
    data.activeWorkout.currentView = 'dashboard';
    delete data.activeWorkout.currentExercise;
    if (!data.activeWorkout.logs) {
      data.activeWorkout.logs = data.activeWorkout.exercises.map(e => ({
        name: e.name,
        sets: Array.from({ length: e.sets }, () => ({ weight: "", reps: "" }))
      }));
    }
  }

  // ----- Helper functions -----
  function save() {
    localStorage.setItem("workoutApp", JSON.stringify(data));
  }

  // Apply theme class to body
  function applyTheme() {
    document.body.className = `theme-${data.theme}`;
  }

  // ----- Timer (unchanged) -----
  let timerInterval = null;
  function clearTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }
  function startTimer(seconds) {
    if (!data.activeWorkout) return;
    const endTime = Date.now() + seconds * 1000;
    data.activeWorkout.timerEnd = endTime;
    save();
    updateTimerDisplay();
    clearTimer();
    timerInterval = setInterval(() => {
      if (!data.activeWorkout) {
        clearTimer();
        return;
      }
      updateTimerDisplay();
    }, 200);
  }
  function updateTimerDisplay() {
    const timerDiv = document.getElementById('timer');
    if (!timerDiv) return;
    if (!data.activeWorkout || !data.activeWorkout.timerEnd) {
      timerDiv.innerText = '0:00';
      return;
    }
    const remaining = Math.max(0, Math.floor((data.activeWorkout.timerEnd - Date.now()) / 1000));
    timerDiv.innerText = formatTime(remaining);
    if (remaining <= 0) {
      clearTimer();
      if (data.activeWorkout) delete data.activeWorkout.timerEnd;
      save();
      timerDiv.innerText = '0:00';
      alert('Rest over!');
    }
  }
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
  }
  function resumeTimerIfNeeded() {
    if (data.activeWorkout && data.activeWorkout.timerEnd) {
      const remaining = Math.floor((data.activeWorkout.timerEnd - Date.now()) / 1000);
      if (remaining > 0) {
        clearTimer();
        timerInterval = setInterval(updateTimerDisplay, 200);
        updateTimerDisplay();
      } else {
        delete data.activeWorkout.timerEnd;
        save();
      }
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      resumeTimerIfNeeded();
      if (data.activeWorkout) renderWorkout();
    }
  });

  // ----- SHARE / IMPORT (unchanged) -----
  function parseShareLink() {
    const hash = window.location.hash.substring(1);
    if (!hash) return;
    try {
      const decoded = atob(hash);
      const imported = JSON.parse(decoded);
      if (imported && Array.isArray(imported)) {
        imported.forEach(t => {
          t.id = 'shared-' + Date.now() + '-' + Math.random().toString(36).substring(2,8);
        });
        data.templates = [...data.templates, ...imported];
        save();
        alert('Imported ' + imported.length + ' template(s) from link!');
        window.location.hash = '';
      }
    } catch (e) {}
  }
  parseShareLink();

  // ----- WEIGHT TRACKING (unchanged) -----
  window.addWeight = () => {
    const weightInput = document.getElementById('newWeight');
    const personSelect = document.getElementById('weightPerson');
    const dateInput = document.getElementById('weightDate');
    const weight = parseFloat(weightInput.value);
    if (isNaN(weight) || weight <= 0) {
      alert('Please enter a valid weight (kg)');
      return;
    }
    const person = personSelect.value;
    let date = dateInput.value ? new Date(dateInput.value + 'T12:00:00') : new Date();
    data.bodyWeight.push({
      date: date.toISOString(),
      weight: weight,
      person: person
    });
    data.bodyWeight.sort((a,b) => new Date(a.date) - new Date(b.date));
    save();
    weightInput.value = '';
    dateInput.value = '';
    renderHome();
  };

  window.deleteWeight = (index) => {
    if (confirm('Delete this weight entry?')) {
      data.bodyWeight.splice(index, 1);
      save();
      renderHome();
    }
  };

  // ----- PROGRESS SUMMARY (unchanged) -----
  window.copyProgressSummary = () => {
    const weights = data.bodyWeight;
    const recentWorkouts = data.history.slice(-5).reverse();

    let summary = `🏋️ Workout Progress Summary\n`;
    summary += `Generated: ${new Date().toLocaleString()}\n\n`;

    // Per-person summary
    ['Dexter', 'Cheryl'].forEach(person => {
      const personWeights = weights.filter(w => w.person === person);
      if (personWeights.length) {
        const first = personWeights[0];
        const last = personWeights[personWeights.length-1];
        const diff = (last.weight - first.weight).toFixed(1);
        const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '●';
        summary += `${person}: ${first.weight}kg (${new Date(first.date).toLocaleDateString()}) → ${last.weight}kg (${new Date(last.date).toLocaleDateString()}) ${arrow} ${Math.abs(diff)}kg\n`;
      } else {
        summary += `${person}: No weights logged.\n`;
      }
    });
    summary += '\n';

    summary += `📅 Last ${recentWorkouts.length} workouts:\n`;
    if (recentWorkouts.length === 0) {
      summary += `No workouts logged.\n`;
    } else {
      recentWorkouts.forEach(w => {
        const date = new Date(w.date).toLocaleDateString();
        const totalSets = w.logs.reduce((acc, ex) => acc + ex.sets.filter(s => s.reps).length, 0);
        summary += `• ${date} – ${w.templateName} (${totalSets} sets logged)\n`;
      });
    }

    navigator.clipboard.writeText(summary).then(() => {
      alert('Progress summary copied to clipboard!');
    }).catch(() => alert('Could not copy automatically.'));
  };

  // ----- THEME PICKER (now with Not Cheryl) -----
  window.setTheme = (theme) => {
    data.theme = theme;
    save();
    applyTheme();
    if (data.activeWorkout) renderWorkout();
    else renderHome();
  };

  // ----- TEMPLATE CRUD (unchanged) -----
  window.createTemplate = () => {
    const name = prompt("Template Name:");
    if(!name) return;
    data.templates.push({
      id: 'manual-' + Date.now() + '-' + Math.random().toString(36),
      name,
      rest: 120,
      repRange: "8-15",
      exercises: []
    });
    save();
    renderHome();
  };

  window.deleteTemplate = (id) => {
    if(confirm("Delete template?")){
      data.templates = data.templates.filter(t => t.id !== id);
      save();
      renderHome();
    }
  };

  function findTemplateIndex(id) {
    return data.templates.findIndex(t => t.id === id);
  }

  window.editTemplate = (id) => {
    const i = findTemplateIndex(id);
    if (i === -1) return renderHome();
    const template = data.templates[i];
    const app = document.getElementById("app");
    applyTheme();

    app.innerHTML = `
      <button onclick="renderHome()">← Back</button>
      <h2>${template.name}</h2>
      <label>Rest (seconds)</label>
      <input value="${template.rest}" onchange="updateRest('${id}',this.value)">
      <h3>Exercises (drag handle ⋮⋮ to reorder)</h3>
      <div id="exerciseList" style="margin: 10px 0;">
        ${template.exercises.map((e, ei) => `
          <div class="exercise-card" draggable="true" data-index="${ei}" data-id="${id}">
            <div style="display:flex; align-items:center;">
              <span class="drag-handle">⋮⋮</span>
              <div style="flex:1;">
                <b>${e.name}</b> (${e.sets} sets)
              </div>
            </div>
            <div class="flex-row" style="margin-top:8px; justify-content:flex-end;">
              <button class="small-btn" onclick="editExercise('${id}', ${ei})">✏️ Edit</button>
              <button class="small-btn" onclick="deleteExercise('${id}', ${ei})">🗑️</button>
            </div>
          </div>
        `).join("")}
      </div>
      <button onclick="addExercise('${id}')">+ Add Exercise</button>
    `;

    const list = document.getElementById('exerciseList');
    let draggedItem = null;
    list.querySelectorAll('.exercise-card').forEach(card => {
      card.addEventListener('dragstart', (e) => {
        draggedItem = card;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', card.dataset.index);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        draggedItem = null;
      });
      card.addEventListener('dragover', (e) => e.preventDefault());
      card.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!draggedItem || draggedItem === card) return;
        const fromIndex = parseInt(draggedItem.dataset.index);
        const toIndex = parseInt(card.dataset.index);
        const templateId = card.dataset.id;
        const tIdx = findTemplateIndex(templateId);
        if (tIdx === -1) return;
        const exercises = data.templates[tIdx].exercises;
        const [moved] = exercises.splice(fromIndex, 1);
        exercises.splice(toIndex, 0, moved);
        save();
        editTemplate(templateId);
      });
    });
  };

  window.editExercise = (templateId, exerciseIdx) => {
    const i = findTemplateIndex(templateId);
    if (i === -1) return;
    const exercise = data.templates[i].exercises[exerciseIdx];
    const newName = prompt("Edit exercise name:", exercise.name);
    if (newName === null) return;
    const newSets = prompt("Number of sets:", exercise.sets);
    if (newSets === null) return;
    exercise.name = newName;
    exercise.sets = parseInt(newSets) || exercise.sets;
    save();
    editTemplate(templateId);
  };

  window.updateRest = (id,val) => {
    const i = findTemplateIndex(id);
    if (i!==-1) data.templates[i].rest = parseInt(val);
    save();
  };

  window.addExercise = (id) => {
    const i = findTemplateIndex(id);
    if (i===-1) return;
    const name = prompt("Exercise name:");
    const sets = prompt("Number of sets:", 2);
    if(!name) return;
    data.templates[i].exercises.push({ name, sets: parseInt(sets) });
    save();
    editTemplate(id);
  };

  window.deleteExercise = (id, ei) => {
    const i = findTemplateIndex(id);
    data.templates[i].exercises.splice(ei,1);
    save();
    editTemplate(id);
  };

  // ----- WORKOUT FLOW with past hints -----
  window.startWorkout = (id) => {
    const i = findTemplateIndex(id);
    if (i === -1) return;
    const template = JSON.parse(JSON.stringify(data.templates[i]));
    template.logs = template.exercises.map(e => ({
      name: e.name,
      sets: Array.from({ length: e.sets }, () => ({ weight: "", reps: "" }))
    }));
    template.startedAt = new Date().toISOString();
    template.templateId = id;
    delete template.timerEnd;
    template.currentView = 'dashboard';
    data.activeWorkout = template;
    save();
    renderWorkout();
  };

  function renderWorkout() {
    if (!data.activeWorkout) return renderHome();
    applyTheme();
    if (data.activeWorkout.currentView === 'dashboard') {
      renderWorkoutDashboard();
    } else if (typeof data.activeWorkout.currentView === 'number') {
      renderExerciseDetail(data.activeWorkout.currentView);
    } else {
      renderWorkoutDashboard();
    }
  }

  function renderWorkoutDashboard() {
    const w = data.activeWorkout;
    const app = document.getElementById("app");
    app.innerHTML = `
      <button onclick="endWorkout()">🏁 End Workout</button>
      <h2>${w.name} · Dashboard</h2>
      <div class="timer" id="timer">${formatTime(w.rest)}</div>
      <div style="margin-top:20px;">
        ${w.logs.map((log, idx) => {
          const logged = log.sets.filter(set => set.reps && set.reps.toString().trim() !== '').length;
          const total = log.sets.length;
          return `
            <div class="exercise-card" style="cursor:pointer;" onclick="doExercise(${idx})">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>${log.name}</b>
                <span style="color:var(--accent);">${logged}/${total} sets</span>
              </div>
              <button class="small-btn" style="margin-top:8px; background:var(--accent);">▶️ Do Exercise</button>
            </div>
          `;
        }).join('')}
      </div>
    `;
    resumeTimerIfNeeded();
  }

  // Helper to get last few logged sets for an exercise from history
  function getPastPerformance(exerciseName) {
    // Go through history (most recent first) and collect up to 3 entries
    const past = [];
    for (let i = data.history.length - 1; i >= 0; i--) {
      const workout = data.history[i];
      const exLog = workout.logs.find(l => l.name === exerciseName);
      if (exLog) {
        // Add each completed set (weight & reps) from that exercise
        exLog.sets.forEach(set => {
          if (set.weight && set.reps) {
            past.push(`${set.weight}kg × ${set.reps}`);
          }
        });
      }
      if (past.length >= 6) break; // limit to 6 examples
    }
    return past.slice(0, 6).join(', ');
  }

  function renderExerciseDetail(exIndex) {
    const w = data.activeWorkout;
    const exercise = w.logs[exIndex];
    const app = document.getElementById("app");

    // Get past performance for this exercise
    const pastHint = getPastPerformance(exercise.name);

    app.innerHTML = `
      <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button class="small-btn" onclick="goToDashboard()">← Back to List</button>
        <button class="small-btn btn-danger" onclick="endWorkout()">🏁 End</button>
      </div>
      <h2>${exercise.name}</h2>
      ${pastHint ? `<div class="past-hint">📋 Past: ${pastHint}</div>` : ''}
      ${exercise.sets.map((set, si) => `
        <div class="exercise-card">
          <b>Set ${si+1}</b><br>
          <input placeholder="Weight (kg)" value="${set.weight || ''}" 
            onchange="updateSet(${exIndex}, ${si}, 'weight', this.value)">
          <input placeholder="Reps" value="${set.reps || ''}" 
            onchange="updateSet(${exIndex}, ${si}, 'reps', this.value)">
          <button class="small-btn" style="background:var(--accent);" onclick="completeSet(${exIndex}, ${si})">✅ Log & Rest</button>
        </div>
      `).join("")}
      <div class="timer" id="timer">${formatTime(w.rest)}</div>
    `;
    resumeTimerIfNeeded();
  }

  window.doExercise = (exIndex) => {
    data.activeWorkout.currentView = exIndex;
    save();
    renderExerciseDetail(exIndex);
  };

  window.goToDashboard = () => {
    data.activeWorkout.currentView = 'dashboard';
    save();
    renderWorkoutDashboard();
  };

  window.updateSet = (exIndex, setIndex, field, value) => {
    const w = data.activeWorkout;
    if (!w) return;
    w.logs[exIndex].sets[setIndex][field] = value;
    save();
  };

  window.completeSet = (exIndex, setIndex) => {
    const w = data.activeWorkout;
    const set = w.logs[exIndex].sets[setIndex];
    if (parseInt(set.reps) > 15) {
      alert("More than 15 reps. Consider increasing weight. Logged anyway.");
    }
    startTimer(w.rest);
  };

  window.endWorkout = () => {
    if (data.activeWorkout) {
      if (confirm('Save current progress to history?')) {
        const w = data.activeWorkout;
        data.history.push({
          date: new Date().toISOString(),
          templateName: w.name,
          logs: w.logs,
          id: w.templateId
        });
      }
    }
    data.activeWorkout = null;
    clearTimer();
    save();
    renderHome();
  };

  // ----- HISTORY (unchanged) -----
  window.exportHistory = () => {
    const historyData = data.history.map(entry => ({
      date: entry.date,
      templateName: entry.templateName,
      logs: entry.logs,
      id: entry.id
    }));
    const jsonStr = JSON.stringify(historyData, null, 2);
    const blob = new Blob([jsonStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `workout_history_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  window.importHistoryPrompt = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) throw new Error('Not an array');
          const safe = imported.filter(entry => entry.templateName && entry.logs && Array.isArray(entry.logs));
          if (safe.length === 0) return alert('No valid history entries found.');
          data.history = [...data.history, ...safe];
          save();
          renderHome();
          alert(`Imported ${safe.length} history entries.`);
        } catch (err) {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  window.deleteHistoryEntry = (index) => {
    if (confirm('Delete this history entry?')) {
      data.history.splice(index, 1);
      save();
      renderHome();
    }
  };

  window.clearAllHistory = () => {
    if (confirm('Delete ALL history? This cannot be undone.')) {
      data.history = [];
      save();
      renderHome();
    }
  };

  // ----- SHARE SELECTION (unchanged) -----
  let selectedShareIds = [];
  window.selectForShare = (id) => {
    if (selectedShareIds.includes(id)) {
      selectedShareIds = selectedShareIds.filter(sid => sid !== id);
    } else {
      selectedShareIds.push(id);
    }
    renderHome();
  };

  window.copyShareLink = () => {
    const selected = data.templates.filter(t => selectedShareIds.includes(t.id));
    if (!selected.length) return alert('No templates selected');
    const clean = selected.map(({ id, name, rest, repRange, exercises }) => ({
      id, name, rest, repRange, exercises
    }));
    const encoded = btoa(JSON.stringify(clean));
    const url = window.location.origin + window.location.pathname + '#' + encoded;
    navigator.clipboard.writeText(url).then(() => {
      alert('Share link copied!');
      selectedShareIds = [];
      renderHome();
    });
  };

  window.exportPrompt = () => {
    const importCode = prompt('Paste a share link or JSON to import templates:');
    if (!importCode) return;
    try {
      let parsed;
      if (importCode.startsWith('http')) {
        const hash = importCode.split('#')[1];
        if (!hash) throw new Error('No hash');
        parsed = JSON.parse(atob(hash));
      } else {
        parsed = JSON.parse(importCode);
      }
      if (Array.isArray(parsed)) {
        parsed.forEach(t => {
          t.id = 'imported-' + Date.now() + '-' + Math.random().toString(36);
          data.templates.push(t);
        });
        save();
        renderHome();
        alert('Imported successfully.');
      } else throw new Error('Invalid format');
    } catch (e) {
      alert('Could not import. Make sure it is a valid share link or JSON array.');
    }
  };

  // ----- RENDER HOME with new layout and Not Cheryl hiding -----
  function renderHome() {
    const app = document.getElementById("app");
    applyTheme();

    // Countdown (hidden in Not Cheryl via CSS)
    const now = new Date();
    let target = new Date(now.getFullYear(), 4, 1);
    if (now > target) target = new Date(now.getFullYear() + 1, 4, 1);
    const diffMs = target - now;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const countdownText = `❤️ ${diffDays} days, ${diffHours} hours until May 1 ❤️`;

    // Person stats for cards
    const persons = ['Dexter', 'Cheryl'];
    const personStats = persons.map(person => {
      const weights = data.bodyWeight.filter(w => w.person === person);
      if (weights.length === 0) return { person, first: null, last: null, delta: null };
      const first = weights[0];
      const last = weights[weights.length-1];
      const delta = (last.weight - first.weight).toFixed(1);
      return { person, first, last, delta };
    });

    app.innerHTML = `
      <div class="countdown">${countdownText}</div>

      <!-- Weight Cards (top) - hidden in Not Cheryl -->
      <div class="weight-summary-cards">
        ${personStats.map(stat => {
          if (!stat.first) {
            return `<div class="person-card"><b>${stat.person}</b><br>No entries yet</div>`;
          }
          const deltaClass = stat.delta > 0 ? 'positive' : (stat.delta < 0 ? 'negative' : '');
          const arrow = stat.delta > 0 ? '▲' : (stat.delta < 0 ? '▼' : '●');
          return `
            <div class="person-card">
              <b>${stat.person}</b><br>
              Start: ${stat.first.weight} kg (${new Date(stat.first.date).toLocaleDateString()})<br>
              Now: ${stat.last.weight} kg (${new Date(stat.last.date).toLocaleDateString()})<br>
              <span class="delta ${deltaClass}">${arrow} ${Math.abs(stat.delta)} kg</span>
            </div>
          `;
        }).join('')}
      </div>

      <!-- Workouts Header -->
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🏋️ Workouts</h2>
        <span class="version-badge">v${APP_VERSION}</span>
      </div>
      <button onclick="createTemplate()">➕ Create Workout</button>
      <button onclick="exportPrompt()" style="background:var(--surface-light);">🔗 Share / Import Workouts</button>
      <div id="templateList">
        ${data.templates.map((t,i)=>`
          <div class="template-item">
            <div style="display:flex; justify-content:space-between;">
              <b>${t.name}</b> <span style="color:var(--text-secondary);">${t.exercises.length} ex</span>
            </div>
            <div class="flex-row" style="margin-top:8px;">
              <button class="small-btn" onclick="startWorkout('${t.id}')">▶️ Start</button>
              <button class="small-btn" onclick="editTemplate('${t.id}')">✏️ Edit</button>
              <button class="small-btn" onclick="deleteTemplate('${t.id}')">🗑️</button>
              <button class="small-btn" onclick="selectForShare('${t.id}')" style="background:var(--surface-light);">🔗 Select</button>
            </div>
          </div>
        `).join("")}
      </div>

      <!-- Theme Picker (now includes Not Cheryl) -->
      <div class="theme-picker">
        <button class="small-btn" onclick="setTheme('dark')">🌙 Dark</button>
        <button class="small-btn" onclick="setTheme('light')">☀️ Light</button>
        <button class="small-btn" onclick="setTheme('cute')">🌸 Cute</button>
        <button class="small-btn" onclick="setTheme('notcheryl')">🚫 Not Cheryl</button>
      </div>

      <!-- Weight Logging Panel (hidden in Not Cheryl) -->
      <div class="weight-logging">
        <h3>⚖️ Log New Weight</h3>
        <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
          <input type="number" id="newWeight" placeholder="Weight (kg)" step="0.1" style="flex:2;">
          <select id="weightPerson" style="flex:1;">
            <option value="Dexter">Dexter</option>
            <option value="Cheryl">Cheryl</option>
          </select>
          <input type="date" id="weightDate" style="flex:2;" placeholder="Date (optional)">
          <button class="small-btn btn-primary" onclick="addWeight()" style="width:auto;">➕ Log</button>
          <button class="small-btn" onclick="copyProgressSummary()" style="background:var(--accent);">📤 Copy Summary</button>
        </div>

        <div style="margin-top:24px;">
          <h4>Past entries</h4>
          ${data.bodyWeight.map((w, idx) => `
            <div class="weight-item flex-row" style="justify-content:space-between;">
              <span>${new Date(w.date).toLocaleDateString()} – <b>${w.person}</b>: <strong>${w.weight} kg</strong></span>
              <button class="small-btn btn-danger" onclick="deleteWeight(${idx})">🗑️</button>
            </div>
          `).join('')}
          ${data.bodyWeight.length === 0 ? '<p style="color:var(--text-secondary);">No weight logged yet.</p>' : ''}
        </div>
      </div>

      <h3 style="margin-top:24px;">📜 Full History (${data.history.length})</h3>
      <div class="import-export-bar">
        <button class="small-btn" onclick="exportHistory()" style="background:var(--surface-light);">📤 Export History</button>
        <button class="small-btn" onclick="importHistoryPrompt()" style="background:var(--surface-light);">📥 Import History</button>
        <button class="small-btn btn-danger" onclick="clearAllHistory()">🗑️ Clear All</button>
      </div>
      <div id="historyList">
        ${data.history.slice().reverse().map((s, idx) => {
          const realIndex = data.history.length - 1 - idx;
          return `
          <div class="history-item">
            <div style="display:flex; justify-content:space-between;">
              <b>${s.templateName}</b>
              <span style="color:var(--text-secondary);">${new Date(s.date).toLocaleString()}</span>
            </div>
            <details>
              <summary>View details</summary>
              ${s.logs.map(l => `
                <div style="margin:6px 0; background:var(--surface-light); padding:6px; border-radius:6px;">
                  <b>${l.name}</b><br>
                  ${l.sets.map((set, setIdx) => `
                    Set ${setIdx+1}: ${set.weight || '?'} kg × ${set.reps || '?'} reps
                  `).join('<br>')}
                </div>
              `).join('')}
            </details>
            <div class="history-actions">
              <button class="small-btn btn-danger" onclick="deleteHistoryEntry(${realIndex})">Delete</button>
            </div>
          </div>
        `}).join('')}
        ${data.history.length === 0 ? '<p style="color:var(--text-secondary);">No past workouts yet.</p>' : ''}
      </div>
    `;

    // Share bar if any templates selected
    if (selectedShareIds.length > 0) {
      let bar = document.getElementById('shareBar');
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'shareBar';
        bar.className = 'sticky-share-bar';
        document.getElementById('app').appendChild(bar);
      }
      bar.innerHTML = `
        <span>${selectedShareIds.length} selected</span>
        <button class="small-btn" onclick="copyShareLink()">📋 Copy link</button>
        <button class="small-btn btn-danger" onclick="selectedShareIds=[]; renderHome();">✖ Clear</button>
      `;
    }
  }

  // Expose globals
  window.renderHome = renderHome;
  window.save = save;

  // Initial render
  applyTheme();
  renderHome();
  resumeTimerIfNeeded();
})();
</script>
</body>
</html>
